<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;">
  <title>SSH Nexus</title>
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css">
  <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../../node_modules/@xterm/addon-search/lib/addon-search.js"></script>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
<div id="app">
  <!-- 标题栏 -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <div class="app-logo">
        <img src="../../resources/icon.png" width="18" height="18" alt="" style="border-radius:3px">
        <span class="app-name">SSH Nexus</span>
      </div>
    </div>
    <div class="titlebar-controls">
      <button class="win-btn" id="btn-minimize"><svg width="10" height="1" viewBox="0 0 10 1"><line x1="0" y1="0.5" x2="10" y2="0.5" stroke="currentColor" stroke-width="1.2"/></svg></button>
      <button class="win-btn" id="btn-maximize"><svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
      <button class="win-btn close" id="btn-close"><svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg></button>
    </div>
  </div>

  <!-- 主布局 -->
  <div id="layout">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="search-wrap">
          <svg class="search-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="搜索连接…">
        </div>
        <button class="icon-btn primary" id="btn-new-conn" title="新建连接">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <!-- 快速操作 -->
      <div class="quick-actions">
        <button class="quick-btn" id="btn-local-shell">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          本地终端
        </button>
        <button class="quick-btn" id="btn-snippets">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg>
          命令片段
        </button>
        <button class="quick-btn" id="btn-tunnels">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          SSH 隧道
        </button>
      </div>

      <div id="connection-list"></div>

      <div class="sidebar-footer">
        <button class="footer-btn" id="btn-import" title="导入配置">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="footer-btn" id="btn-export" title="导出配置">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="footer-btn" id="btn-settings" title="设置">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        </button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main id="main-content">
      <div id="tab-bar">
        <div id="tabs-container"></div>
        <button class="icon-btn" id="btn-new-tab" title="新建本地终端">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div id="terminals-container">
        <div id="welcome-screen">
          <div class="welcome-glow"></div>
          <div class="welcome-content">
            <div class="welcome-logo">
              <img src="../../resources/icon.png" width="64" height="64" alt="" style="border-radius:14px">
            </div>
            <h1 class="welcome-title">SSH Nexus</h1>
            <p class="welcome-sub">安全、快速的 SSH 连接管理工具</p>
            <div class="welcome-actions">
              <button class="welcome-btn primary" id="welcome-new-conn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建连接
              </button>
              <button class="welcome-btn" id="welcome-local-shell">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                本地终端
              </button>
            </div>
            <div class="shortcuts">
              <div class="shortcut"><kbd>⌘N</kbd> 新建连接</div>
              <div class="shortcut"><kbd>⌘T</kbd> 新建终端</div>
              <div class="shortcut"><kbd>⌘W</kbd> 关闭标签</div>
              <div class="shortcut"><kbd>⌘D</kbd> 分屏</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- ── 模态框：新建/编辑连接 ── -->
<div id="modal-overlay" class="hidden">
  <div id="modal-conn" class="modal">
    <div class="modal-header">
      <h2 id="modal-title">新建 SSH 连接</h2>
      <button class="icon-btn" id="modal-close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="conn-id">
      <div class="form-row two-col">
        <div class="form-group"><label>连接名称 <span class="required">*</span></label><input type="text" id="conn-name" placeholder="我的服务器"></div>
        <div class="form-group"><label>分组</label><select id="conn-group"></select></div>
      </div>
      <div class="form-row two-col">
        <div class="form-group"><label>主机地址 <span class="required">*</span></label><input type="text" id="conn-host" placeholder="192.168.1.100"></div>
        <div class="form-group narrow"><label>端口</label><input type="number" id="conn-port" value="22"></div>
      </div>
      <div class="form-row two-col">
        <div class="form-group"><label>用户名 <span class="required">*</span></label><input type="text" id="conn-username" placeholder="root"></div>
        <div class="form-group" style="flex:0 0 106px"><label>保持活动 (秒)</label><input type="number" id="conn-keepalive" value="300" min="0" placeholder="300"></div>
      </div>
      <div class="form-group">
        <label>认证方式</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="auth-type" value="password" checked> 密码认证</label>
          <label class="radio-label"><input type="radio" name="auth-type" value="privateKey"> 私钥认证</label>
        </div>
      </div>
      <div id="auth-password-section" class="form-group"><label>密码</label><input type="password" id="conn-password" placeholder="••••••••"></div>
      <div id="auth-key-section" class="hidden">
        <div class="form-group"><label>私钥路径</label><input type="text" id="conn-private-key" placeholder="~/.ssh/id_rsa"></div>
        <div class="form-group"><label>私钥密码（可选）</label><input type="password" id="conn-passphrase"></div>
      </div>
      <div class="form-group"><label>备注</label><input type="text" id="conn-remark" placeholder="可选备注"></div>
      <div class="section-toggle" id="jump-toggle">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
        跳板机配置（可选）
      </div>
      <div id="jump-section" class="hidden">
        <div class="form-row two-col">
          <div class="form-group"><label>跳板机主机</label><input type="text" id="jump-host" placeholder="jump.example.com"></div>
          <div class="form-group narrow"><label>端口</label><input type="number" id="jump-port" value="22"></div>
        </div>
        <div class="form-row two-col">
          <div class="form-group"><label>用户名</label><input type="text" id="jump-username"></div>
          <div class="form-group"><label>密码</label><input type="password" id="jump-password"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="test-result" id="test-result"></div>
      <div class="modal-actions">
        <button class="btn outline" id="btn-test-conn">测试连接</button>
        <button class="btn" id="btn-cancel-conn">取消</button>
        <button class="btn primary" id="btn-save-conn">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ── 模态框：Snippets ── -->
<div id="modal-snippets-overlay" class="hidden">
  <div class="modal wide">
    <div class="modal-header">
      <h2>命令片段</h2>
      <button class="icon-btn" id="snippets-close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body snippets-layout">
      <div class="snippets-list-col">
        <div class="snippets-toolbar">
          <button class="btn primary small" id="snippet-new">+ 新建</button>
        </div>
        <div id="snippet-list"></div>
      </div>
      <div class="snippets-edit-col" id="snippet-editor">
        <div class="snippet-empty">选择或新建一个命令片段</div>
      </div>
    </div>
  </div>
</div>

<!-- ── 模态框：SSH 隧道 ── -->
<div id="modal-tunnels-overlay" class="hidden">
  <div class="modal wide">
    <div class="modal-header">
      <h2>SSH 隧道 / 端口转发</h2>
      <button class="icon-btn" id="tunnels-close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <!-- 新建隧道表单 -->
      <div class="tunnel-form">
        <input type="hidden" id="tunnel-id">
        <div class="form-row three-col">
          <div class="form-group"><label>名称</label><input type="text" id="tunnel-name" placeholder="我的隧道"></div>
          <div class="form-group"><label>关联连接</label><select id="tunnel-conn"></select></div>
          <div class="form-group"><label>类型</label>
            <select id="tunnel-type">
              <option value="local">本地转发 (Local)</option>
              <option value="dynamic">动态代理 (SOCKS5)</option>
            </select>
          </div>
        </div>
        <div class="form-row three-col" id="tunnel-target-row">
          <div class="form-group"><label>本地端口</label><input type="number" id="tunnel-local-port" placeholder="8080"></div>
          <div class="form-group"><label>目标主机</label><input type="text" id="tunnel-remote-host" placeholder="127.0.0.1"></div>
          <div class="form-group"><label>目标端口</label><input type="number" id="tunnel-remote-port" placeholder="80"></div>
        </div>
        <div class="modal-actions" style="justify-content:flex-start">
          <button class="btn primary" id="tunnel-save-btn">保存隧道</button>
        </div>
      </div>
      <div class="section-label">已保存的隧道</div>
      <div id="tunnel-list"></div>
    </div>
  </div>
</div>

<!-- ── 模态框：设置 ── -->
<div id="modal-settings-overlay" class="hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>设置</h2>
      <button class="icon-btn" id="settings-close"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="settings-tabs">
        <button class="stab active" data-tab="terminal">终端</button>
        <button class="stab" data-tab="theme">主题</button>
        <button class="stab" data-tab="reconnect">自动重连</button>
        <button class="stab" data-tab="log">日志</button>
      </div>

      <!-- 终端 -->
      <div class="stab-panel active" id="stab-terminal">
        <div class="form-row two-col">
          <div class="form-group"><label>字体大小</label><input type="number" id="s-font-size" min="10" max="24" value="14"></div>
          <div class="form-group"><label>光标样式</label>
            <select id="s-cursor-style"><option value="block">块状</option><option value="bar">竖线</option><option value="underline">下划线</option></select>
          </div>
        </div>
        <div class="form-group"><label>字体</label><input type="text" id="s-font-family" placeholder="JetBrains Mono, monospace"></div>
        <div class="form-group"><label>回滚行数</label><input type="number" id="s-scrollback" min="100" max="50000" value="5000"></div>
      </div>

      <!-- 主题 -->
      <div class="stab-panel" id="stab-theme">
        <div class="form-group"><label>界面主题</label>
          <div class="theme-grid" id="theme-grid">
            <div class="theme-card active" data-theme="dark"><div class="theme-preview dark-prev"></div><span>深色（默认）</span></div>
            <div class="theme-card" data-theme="darker"><div class="theme-preview darker-prev"></div><span>极深色</span></div>
            <div class="theme-card" data-theme="light"><div class="theme-preview light-prev"></div><span>浅色</span></div>
            <div class="theme-card" data-theme="nord"><div class="theme-preview nord-prev"></div><span>Nord</span></div>
            <div class="theme-card" data-theme="solarized"><div class="theme-preview solarized-prev"></div><span>Solarized</span></div>
            <div class="theme-card" data-theme="dracula"><div class="theme-preview dracula-prev"></div><span>Dracula</span></div>
          </div>
        </div>
      </div>

      <!-- 自动重连 -->
      <div class="stab-panel" id="stab-reconnect">
        <div class="form-group">
          <label class="toggle-label">
            <input type="checkbox" id="s-auto-reconnect"> 断线后自动重连
          </label>
        </div>
        <div class="form-row two-col">
          <div class="form-group"><label>重连延迟（毫秒）</label><input type="number" id="s-reconnect-delay" value="3000" min="500"></div>
          <div class="form-group"><label>最大重试次数</label><input type="number" id="s-reconnect-max" value="5" min="1" max="20"></div>
        </div>
      </div>

      <!-- 日志 -->
      <div class="stab-panel" id="stab-log">
        <div class="form-group">
          <label class="toggle-label"><input type="checkbox" id="s-log-enabled"> 启用终端日志记录</label>
        </div>
        <div class="form-group"><label>日志保存目录</label>
          <div style="display:flex;gap:8px">
            <input type="text" id="s-log-dir" style="flex:1">
            <button class="btn outline small" id="s-log-open">打开目录</button>
          </div>
        </div>
        <div class="section-label" style="margin-top:12px">最近日志文件</div>
        <div id="log-file-list" style="max-height:160px;overflow-y:auto"></div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="modal-actions" style="margin-left:auto">
        <button class="btn" id="settings-cancel">取消</button>
        <button class="btn primary" id="settings-save">保存设置</button>
      </div>
    </div>
  </div>
</div>

<!-- ── SFTP 面板 ── -->
<div id="sftp-panel" class="hidden">
  <div class="sftp-header">
    <div class="sftp-path-bar">
      <button class="icon-btn" id="sftp-up" title="上级目录">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <input type="text" id="sftp-path-input" class="sftp-path-input" value="/">
      <button class="icon-btn" id="sftp-refresh" title="刷新">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn small" id="sftp-upload-btn">上传</button>
      <button class="btn small" id="sftp-mkdir-btn">新建目录</button>
      <button class="icon-btn" id="sftp-close-btn" title="关闭 SFTP">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div id="sftp-progress-bar" class="hidden">
    <div class="progress-inner" id="sftp-progress-inner"></div>
    <span id="sftp-progress-label">0%</span>
  </div>
  <div id="sftp-file-list"></div>
</div>

<!-- 右键菜单 -->
<div id="context-menu" class="hidden">
  <div class="ctx-item" data-action="connect"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg> 连接</div>
  <div class="ctx-item" data-action="sftp"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> 打开 SFTP</div>
  <div class="ctx-item" data-action="edit"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 编辑</div>
  <div class="ctx-item" data-action="duplicate"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制</div>
  <div class="ctx-item" data-action="split"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg> 分屏连接</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" data-action="delete"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 删除</div>
</div>

<!-- 终端右键菜单 -->
<div id="terminal-ctx-menu" class="hidden">
  <div class="ctx-item" data-action="split-h"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg> 左右分屏</div>
  <div class="ctx-item" data-action="split-v"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg> 上下分屏</div>
  <div class="ctx-item" data-action="snippets-send"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg> 发送片段…</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" data-action="clear"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg> 清屏</div>
</div>

  </div>
