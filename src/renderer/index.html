<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;">
  <title>SSH Nexus</title>

  <!-- xterm.js — 本地 node_modules，无需网络 -->
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css">
  <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="../../node_modules/@xterm/addon-search/lib/addon-search.js"></script>

  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
<div id="app">
  <!-- 标题栏 -->
  <div id="titlebar">
    <div class="titlebar-drag">
      <div class="app-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10-4.48 10-10 10S2 17.52 2 12z" fill="none" stroke="#4ade80" stroke-width="1.5"/>
          <path d="M8 12l3 3 5-5" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" fill="#4ade80" opacity="0.2"/>
        </svg>
        <span class="app-name">SSH Nexus</span>
      </div>
    </div>
    <div class="titlebar-controls">
      <button class="win-btn" id="btn-minimize" title="最小化">
        <svg width="10" height="1" viewBox="0 0 10 1"><line x1="0" y1="0.5" x2="10" y2="0.5" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="win-btn" id="btn-maximize" title="最大化">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="win-btn close" id="btn-close" title="关闭">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- 主布局 -->
  <div id="layout">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="search-wrap">
          <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="搜索连接..." />
        </div>
        <button class="icon-btn primary" id="btn-new-conn" title="新建连接">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <!-- 快速操作 -->
      <div class="quick-actions">
        <button class="quick-btn" id="btn-local-shell">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          本地终端
        </button>
      </div>

      <!-- 连接列表 -->
      <div id="connection-list">
        <div class="empty-state" id="empty-connections">
          <div class="empty-icon">⌁</div>
          <p>暂无连接</p>
          <span>点击 + 添加你的第一个 SSH 连接</span>
        </div>
      </div>

      <!-- 侧边栏底部 -->
      <div class="sidebar-footer">
        <button class="footer-btn" id="btn-settings" title="设置">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        </button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main id="main-content">
      <!-- 标签页栏 -->
      <div id="tab-bar">
        <div id="tabs-container"></div>
        <button class="icon-btn" id="btn-new-tab" title="新建本地终端标签">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <!-- 终端容器 -->
      <div id="terminals-container">
        <div id="welcome-screen">
          <div class="welcome-glow"></div>
          <div class="welcome-content">
            <div class="welcome-logo">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <circle cx="32" cy="32" r="30" stroke="#4ade80" stroke-width="1.5" opacity="0.3"/>
                <circle cx="32" cy="32" r="20" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
                <circle cx="32" cy="32" r="8" fill="#4ade80" opacity="0.8"/>
                <path d="M20 32l7 7 17-17" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h1 class="welcome-title">SSH Nexus</h1>
            <p class="welcome-sub">安全、快速的 SSH 连接管理工具</p>
            <div class="welcome-actions">
              <button class="welcome-btn primary" id="welcome-new-conn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建连接
              </button>
              <button class="welcome-btn" id="welcome-local-shell">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,17 10,11 4,5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                本地终端
              </button>
            </div>
            <div class="shortcuts">
              <div class="shortcut"><kbd>Ctrl</kbd><kbd>N</kbd> 新建连接</div>
              <div class="shortcut"><kbd>Ctrl</kbd><kbd>T</kbd> 新建终端</div>
              <div class="shortcut"><kbd>Ctrl</kbd><kbd>W</kbd> 关闭标签</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 模态框：新建/编辑连接 -->
<div id="modal-overlay" class="hidden">
  <div id="modal-conn" class="modal">
    <div class="modal-header">
      <h2 id="modal-title">新建 SSH 连接</h2>
      <button class="icon-btn" id="modal-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="conn-id">

      <div class="form-row two-col">
        <div class="form-group">
          <label>连接名称 <span class="required">*</span></label>
          <input type="text" id="conn-name" placeholder="我的服务器" />
        </div>
        <div class="form-group">
          <label>分组</label>
          <select id="conn-group"></select>
        </div>
      </div>

      <div class="form-row two-col">
        <div class="form-group">
          <label>主机地址 <span class="required">*</span></label>
          <input type="text" id="conn-host" placeholder="192.168.1.100 或 example.com" />
        </div>
        <div class="form-group narrow">
          <label>端口</label>
          <input type="number" id="conn-port" value="22" min="1" max="65535" />
        </div>
      </div>

      <div class="form-group">
        <label>用户名 <span class="required">*</span></label>
        <input type="text" id="conn-username" placeholder="root" />
      </div>

      <div class="form-group">
        <label>认证方式</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="auth-type" value="password" checked> 密码认证
          </label>
          <label class="radio-label">
            <input type="radio" name="auth-type" value="privateKey"> 私钥认证
          </label>
        </div>
      </div>

      <div id="auth-password-section" class="form-group">
        <label>密码</label>
        <input type="password" id="conn-password" placeholder="••••••••" />
      </div>

      <div id="auth-key-section" class="hidden">
        <div class="form-group">
          <label>私钥路径</label>
          <input type="text" id="conn-private-key" placeholder="~/.ssh/id_rsa" />
        </div>
        <div class="form-group">
          <label>私钥密码（可选）</label>
          <input type="password" id="conn-passphrase" placeholder="如果有的话" />
        </div>
      </div>

      <div class="form-group">
        <label>备注</label>
        <input type="text" id="conn-remark" placeholder="可选：添加备注说明" />
      </div>

      <!-- 跳板机 -->
      <div class="section-toggle" id="jump-toggle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
        跳板机配置（可选）
      </div>
      <div id="jump-section" class="hidden">
        <div class="form-row two-col">
          <div class="form-group">
            <label>跳板机主机</label>
            <input type="text" id="jump-host" placeholder="jump.example.com" />
          </div>
          <div class="form-group narrow">
            <label>端口</label>
            <input type="number" id="jump-port" value="22" />
          </div>
        </div>
        <div class="form-row two-col">
          <div class="form-group">
            <label>跳板机用户名</label>
            <input type="text" id="jump-username" placeholder="ubuntu" />
          </div>
          <div class="form-group">
            <label>跳板机密码</label>
            <input type="password" id="jump-password" />
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <div class="test-result" id="test-result"></div>
      <div class="modal-actions">
        <button class="btn outline" id="btn-test-conn">测试连接</button>
        <button class="btn" id="btn-cancel-conn">取消</button>
        <button class="btn primary" id="btn-save-conn">保存连接</button>
      </div>
    </div>
  </div>
</div>

<!-- 右键菜单 -->
<div id="context-menu" class="hidden">
  <div class="ctx-item" data-action="connect">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    连接
  </div>
  <div class="ctx-item" data-action="edit">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    编辑
  </div>
  <div class="ctx-item" data-action="duplicate">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    复制
  </div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" data-action="delete">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    删除
  </div>
</div>

<!-- Toast 通知 -->
<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
